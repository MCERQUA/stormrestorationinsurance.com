[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NEXT_DISABLE_TURBOPACK = "1"
  NODE_VERSION = "18"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[notifications]]
  form_name = "quote"
  [notifications.webhook]
    url = "https://josh.jam-bot.com/social-api/api/leads/webhook/netlify?tenant=josh&site=stormrestorationinsurance.com"
    events = ["submission_created"]

[[notifications]]
  form_name = "contact"
  [notifications.webhook]
    url = "https://josh.jam-bot.com/social-api/api/leads/webhook/netlify?tenant=josh&site=stormrestorationinsurance.com"
    events = ["submission_created"]
