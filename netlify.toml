[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NEXT_DISABLE_TURBOPACK = "1"
  NODE_VERSION = "18"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[notifications]]
  event = "submission_created"
