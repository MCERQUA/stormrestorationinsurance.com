<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Netlify Forms</title>
</head>
<body>
  <!-- Netlify forms decoy — registers form fields with Netlify during build -->
  <form name="quote" netlify netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="quote">
    <input name="bot-field">
    <input name="name">
    <input name="business_name">
    <input name="email">
    <input name="phone">
    <input name="state">
    <input name="years_in_business">
    <input name="primary_work_type">
    <input name="num_employees">
    <input name="annual_revenue">
    <input name="multi_state">
    <textarea name="message"></textarea>
  </form>
</body>
</html>
